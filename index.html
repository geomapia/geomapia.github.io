<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications | Geomap IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f4c75; --secondary: #3282b8; --accent: #bbe1fa; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: #333; line-height: 1.6; }
        header { background: var(--primary); color: white; padding: 3rem 1rem; text-align: center; }
        .container { max-width: 1100px; margin: auto; padding: 2rem; }
        h2 { color: var(--primary); border-bottom: 3px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        
        /* Grille d'applications */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .app-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .app-info { padding: 1.5rem; }
        .app-info h3 { margin: 0 0 10px 0; color: var(--secondary); }
        .btn { display: inline-block; background: var(--secondary); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <img src="IA.png" alt="Logo Geomap IA" style="height: 120px; margin-bottom: 15px; border-radius: 50%;">
    <h1>Geomap IA - Hub d'Applications</h1>
    <p>Solutions Géomatiques & Intelligence Artificielle</p>
</header>

<div class="container">
    
    <h2><i class="fas fa-rocket"></i> Mes Applications Web</h2>

    <div class="app-grid">

        <div class="app-card" title="Application intégrée pour transformer les données climatiques en diagnostics écologiques. Calculs automatisés et couplage biodiversité & climat.">
            <a href="bioclimat.html" target="_blank">
                <img src="Bioclimat.png" alt="Application Bioclimat" style="width: 50%; display: block; margin: 0 auto; height: 200px; object-fit: contain; border-bottom: 3px solid #bbe1fa;">
            </a>
            
            <div class="app-info" style="text-align: center;">
                <a href="bioclimat.html" target="_blank" style="text-decoration: none; color: inherit;">
                    <h3>Bioclimat & Écologie</h3>
                </a>
            </div>
        </div>

        <div class="app-card" title="Outil de cartographie haute précision v3.0 GOLD. Navigation fluide, données OSM intégrées et interface optimisée pour le repérage spatial.">
            <a href="Carte_de_localisation_version_3_0_GOLD.html" target="_blank">
                <img src="carte_localisation.png" alt="Carte de Localisation" style="width: 50%; display: block; margin: 0 auto; height: 200px; object-fit: contain; border-bottom: 3px solid #bbe1fa;">
            </a>
            
            <div class="app-info" style="text-align: center;">
                <a href="Carte_de_localisation_version_3_0_Gold.html" target="_blank" style="text-decoration: none; color: inherit;">
                    <h3>Carte de Localisation</h3>
                </a>
            </div>
        </div>

    </div>

</div>

<footer>
    <p style="text-align: center; padding: 3rem; color: #888;">&copy; 2026 Geomap IA | Contact : geomap.ia.contact@gmail.com</p>
</footer>

</body>
</html>
