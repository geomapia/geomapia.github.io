<!-- Anti-flash : applique le thème sauvegardé avant le rendu de la page -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) { /* ignore */ }
  })();
